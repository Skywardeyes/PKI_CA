worker_processes  1;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  server {
    listen 8443 ssl;
    server_name localhost;

    # Update these paths to your local deployment paths.
    ssl_certificate           D:/Github/PKI_CA/server/server.cert.pem;
    ssl_certificate_key       D:/Github/PKI_CA/server/server.key.pem;
    ssl_client_certificate    D:/Github/PKI_CA/ca/intermediate/certs/ca-chain.cert.pem;
    ssl_crl                   D:/Github/PKI_CA/ca/intermediate/crl/intermediate.crl.pem;
    ssl_verify_client         on;
    ssl_verify_depth          2;

    location / {
      default_type text/plain;
      return 200 "mTLS success: client cert verified\n";
    }
  }
}
